  featured: true

- title: "The Influence of the Thiol-ene Mechanism on Polymer Network Topology"
  authors: "<strong>R. Ghanta</strong>*, B.C. Jeong*,  A.S. Kuenstler, and A. Statt"
  venue: "Macromolecules, 59, 4, 2500–2514"
  year: 2026
  url: "https://doi.org/10.1021/acs.macromol.5c02209"
  description: >-
  abstract: >-
    Over the past few decades, thiol-ene photopolymerization has gained popularity for synthesizing polymer networks with near-ideal architectures and predictable mechanical properties. However, growing experimental evidence of heterogeneity varying with chemical design parameters in such networks has raised questions about the chemistry’s ideality and the broader relationship between network architecture and macroscopic properties. In this work, we use a computational framework based on generalizable Kremer-Grest bead-spring representations and Monte Carlo-based reactive molecular dynamics to simulate thiol-ene-like network formation. We compare ideal step-growth thiol-ene and step-growth/chain-growth mixed-mechanism photopolymerization pathways of common thiol-based chemistries across tetra-functional cross-linker concentrations. Our results reveal the influence of synthetic variables (i.e., monomer reactivity and composition) on conversion, gelation, network architecture, and bulk mechanical properties. Additionally, we confirm these computational findings with experimental analogues, which reveal reactive accuracy through qualitative agreement between functional-group conversion and gel points. Notably, we find that network defects form more prominently at low cross-linker concentrations and with high monomer rigidity in step-growth systems, the majority of which are dangling ends. In contrast, mixed-mechanism systems produce networks less sensitive to synthetic conditions but with more heterogeneous structures, as evidenced by strand-length distributions and Voronoi volume variance. These findings underscore the role of synthetic conditions and reaction pathways in tuning network topology and provide new insights for the rational design of photopolymerization chemistries.
  toc_image: "/assets/images/1_influence_of_thiol_ene_TOC.svg"
  first_author: true
  featured: true

- title: "Harnessing ene-type and stereochemistry to control reaction kinetics and network architecture in thiol–ene photopolymerizations using maleate and fumarate-derived monomers"
  authors: "<strong>R. Ghanta</strong>, A. Abilova, C. McAndrew and A.S. Kuenstler"
  venue: "Polymer Chemistry, 16, 1829-1845"
  year: 2025
  url: "https://doi.org/10.1234/example3"
  description: >-
  abstract: >-
    Herein we report photo-dose tunable crosslinking density in polymer networks by exploiting the relative rates of thiol–ene click chemistry and chain-growth homopolymerization in symmetric triene monomers. From biomass-derived diacids, these synthesized trienes incorporate terminal allyl ether groups and internal fumarate/maleate groups, providing varied reactivity. Through small-molecule monothiol addition, 1H-NMR results indicate fast preferential thiol addition to terminal allyl groups and slower stereochemistry-dependent homopolymerization of fumarate/maleate groups. Incorporating these monomers with dithiols and triallyl crosslinkers allows formation of polymer networks, using both thiol–ene addition and homopolymerization as photo-crosslinking mechanisms on differing timescales. In situ photo-rheology and dynamic mechanical analysis demonstrate impacts of the mixed-mechanism on light-dependent evolution of network architectures from initial gelation to increasing crosslinking density with prolonged exposure. Ultimately, the mixed-mechanism polymerization enables grayscale patterning and 3D printing, offering potential for in situ patterning of glasslike and rubbery regions within monolithic materials.
  toc_image: "/assets/images/0_fumarate_maleate_TOC.svg"
  first_author: true
  featured: true

